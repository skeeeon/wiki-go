access_rules:
    - pattern: "/"
      access: public
      description: "Example Public section visible to everyone"
    - pattern: "/public/**"
      access: public
      description: "Example Public section visible to everyone"
    - pattern: "/1-get-started/**"
      access: public
      description: "Example Public section visible to everyone"
    - pattern: "/finance/**"
      access: restricted
      groups: [finance-team]
      description: "Example Finance section visible to finance-team group"
    - pattern: "/internal/**"
      access: private
      description: "Example Internal section visible to logged-in users"